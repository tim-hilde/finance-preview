<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sparplaner — Finanzen entscheiden</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml"/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --bg:        oklch(0.985 0.012 75);
    --bg-2:      oklch(0.965 0.018 70);
    --paper:     oklch(0.995 0.006 80);
    --ink:       oklch(0.22 0.02 60);
    --ink-soft:  oklch(0.42 0.02 60);
    --ink-mute:  oklch(0.58 0.015 60);
    --line:      oklch(0.90 0.015 70);
    --line-soft: oklch(0.94 0.012 70);

    --c-cash:    oklch(0.70 0.13 45);
    --c-cash-2:  oklch(0.92 0.05 55);
    --c-etf:     oklch(0.60 0.09 155);
    --c-etf-2:   oklch(0.90 0.045 150);
    --c-extra-1: oklch(0.62 0.10 250);
    --c-extra-2: oklch(0.70 0.10 80);

    --accent:        oklch(0.60 0.12 50);
    --accent-soft:   oklch(0.78 0.10 50);
    --accent-focus:  oklch(0.80 0.10 50 / 0.5);

    --chart-grid:        oklch(0.92 0.012 70);
    --chart-axis:        oklch(0.85 0.015 70);
    --chart-tick:        oklch(0.75 0.015 70);
    --chart-axis-label:  oklch(0.50 0.015 60);
    --chart-y-label:     oklch(0.55 0.015 60);
    --chart-contrib:     oklch(0.35 0.02 60);
    --chart-crosshair:   oklch(0.40 0.05 60);
    --chart-dot:         var(--paper);

    --insight-bg:        oklch(0.95 0.04 60);
    --insight-fg:        oklch(0.45 0.10 50);

    --tt-bg:             oklch(0.22 0.02 60);
    --tt-fg:             oklch(0.98 0.005 80);
    --tt-sep:            oklch(1 0 0 / 0.15);

    --kpi-cash: oklch(0.55 0.13 45);
    --kpi-etf:  oklch(0.45 0.10 155);

    --r-lg: 18px;
    --r-md: 12px;
    --r-sm: 8px;

    --shadow-1: 0 1px 0 oklch(0.92 0.015 70 / 0.8), 0 8px 24px -16px oklch(0.40 0.05 60 / 0.18);
    --shadow-2: 0 1px 0 oklch(0.92 0.015 70 / 0.8), 0 24px 60px -28px oklch(0.40 0.05 60 / 0.28);
  }

  /* Dark palette — applied when OS-dark and user hasn't chosen light */
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg:        oklch(0.16 0.012 75);
      --bg-2:      oklch(0.20 0.014 70);
      --paper:     oklch(0.22 0.012 70);
      --ink:       oklch(0.96 0.006 80);
      --ink-soft:  oklch(0.78 0.010 70);
      --ink-mute:  oklch(0.60 0.012 70);
      --line:      oklch(0.32 0.012 70);
      --line-soft: oklch(0.26 0.010 70);

      --c-cash:    oklch(0.78 0.12 45);
      --c-cash-2:  oklch(0.45 0.06 55);
      --c-etf:     oklch(0.72 0.10 155);
      --c-etf-2:   oklch(0.40 0.05 150);
      --c-extra-1: oklch(0.72 0.11 250);
      --c-extra-2: oklch(0.80 0.10 80);

      --accent:        oklch(0.78 0.12 55);
      --accent-soft:   oklch(0.70 0.10 55);
      --accent-focus:  oklch(0.80 0.12 55 / 0.45);

      --chart-grid:        oklch(0.30 0.012 70);
      --chart-axis:        oklch(0.34 0.012 70);
      --chart-tick:        oklch(0.40 0.012 70);
      --chart-axis-label:  oklch(0.60 0.012 70);
      --chart-y-label:     oklch(0.64 0.012 70);
      --chart-contrib:     oklch(0.75 0.010 70);
      --chart-crosshair:   oklch(0.70 0.015 70);
      --chart-dot:         var(--paper);

      --insight-bg:        oklch(0.30 0.05 60);
      --insight-fg:        oklch(0.88 0.08 55);

      --tt-bg:             oklch(0.96 0.006 80);
      --tt-fg:             oklch(0.20 0.02 60);
      --tt-sep:            oklch(0 0 0 / 0.15);

      --kpi-cash: oklch(0.80 0.12 45);
      --kpi-etf:  oklch(0.78 0.10 155);

      --shadow-1: 0 1px 0 oklch(1 0 0 / 0.03), 0 8px 24px -16px oklch(0 0 0 / 0.55);
      --shadow-2: 0 1px 0 oklch(1 0 0 / 0.04), 0 24px 60px -28px oklch(0 0 0 / 0.65);
    }
  }

  /* Explicit dark override — same values as the @media block above. Edit both when tuning. */
  :root[data-theme="dark"] {
    --bg:        oklch(0.16 0.012 75);
    --bg-2:      oklch(0.20 0.014 70);
    --paper:     oklch(0.22 0.012 70);
    --ink:       oklch(0.96 0.006 80);
    --ink-soft:  oklch(0.78 0.010 70);
    --ink-mute:  oklch(0.60 0.012 70);
    --line:      oklch(0.32 0.012 70);
    --line-soft: oklch(0.26 0.010 70);

    --c-cash:    oklch(0.78 0.12 45);
    --c-cash-2:  oklch(0.45 0.06 55);
    --c-etf:     oklch(0.72 0.10 155);
    --c-etf-2:   oklch(0.40 0.05 150);
    --c-extra-1: oklch(0.72 0.11 250);
    --c-extra-2: oklch(0.80 0.10 80);

    --accent:        oklch(0.78 0.12 55);
    --accent-soft:   oklch(0.70 0.10 55);
    --accent-focus:  oklch(0.80 0.12 55 / 0.45);

    --chart-grid:        oklch(0.30 0.012 70);
    --chart-axis:        oklch(0.34 0.012 70);
    --chart-tick:        oklch(0.40 0.012 70);
    --chart-axis-label:  oklch(0.60 0.012 70);
    --chart-y-label:     oklch(0.64 0.012 70);
    --chart-contrib:     oklch(0.75 0.010 70);
    --chart-crosshair:   oklch(0.70 0.015 70);
    --chart-dot:         var(--paper);

    --insight-bg:        oklch(0.30 0.05 60);
    --insight-fg:        oklch(0.88 0.08 55);

    --tt-bg:             oklch(0.96 0.006 80);
    --tt-fg:             oklch(0.20 0.02 60);
    --tt-sep:            oklch(0 0 0 / 0.15);

    --kpi-cash: oklch(0.80 0.12 45);
    --kpi-etf:  oklch(0.78 0.10 155);

    --shadow-1: 0 1px 0 oklch(1 0 0 / 0.03), 0 8px 24px -16px oklch(0 0 0 / 0.55);
    --shadow-2: 0 1px 0 oklch(1 0 0 / 0.04), 0 24px 60px -28px oklch(0 0 0 / 0.65);
  }

  * { box-sizing: border-box }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: Inter, system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; }

  .num  { font-variant-numeric: tabular-nums; }
  .mono { font-family: "JetBrains Mono", ui-monospace, Menlo, monospace; font-variant-numeric: tabular-nums; }
  .serif { font-family: "Instrument Serif", ui-serif, Georgia, serif; font-weight: 400; letter-spacing: -0.01em; }

  .app {
    position: relative;
    max-width: 1320px;
    margin: 0 auto;
    padding: 28px 28px 80px;
  }

  .theme-toggle {
    position: absolute;
    top: 28px;
    right: 28px;
    width: 36px; height: 36px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 10px;
    color: var(--ink-soft);
    cursor: pointer;
    box-shadow: var(--shadow-1);
    transition: background .15s, color .15s, border-color .15s;
  }
  .theme-toggle:hover { background: var(--bg-2); color: var(--ink); }
  .theme-toggle:focus-visible { outline: 2px solid var(--accent-focus); outline-offset: 2px; }
  .theme-toggle svg { width: 18px; height: 18px; }

  .greet {
    font-family: "Instrument Serif", serif;
    font-size: 44px;
    line-height: 1.05;
    letter-spacing: -0.015em;
    margin: 6px 0 4px;
    max-width: 820px;
    text-wrap: balance;
  }
  .greet em { font-style: italic; color: var(--accent); }
  .greet-sub {
    font-size: 15px; color: var(--ink-soft); max-width: 720px;
    margin-bottom: 22px;
  }

  /* Layout */
  .grid {
    display: grid;
    grid-template-columns: 360px 1fr;
    gap: 22px;
    align-items: start;
  }
  @media (max-width: 980px) {
    .grid { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    box-shadow: var(--shadow-1);
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 18px 20px 8px;
  }
  .card-title { font-family: "Instrument Serif", serif; font-size: 22px; line-height: 1; }
  .card-hint { font-size: 12px; color: var(--ink-mute); }

  /* Slider */
  .slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 999px;
    background: linear-gradient(to right, var(--accent-soft) var(--p, 50%), var(--line) var(--p, 50%));
    outline: none;
  }
  .slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--paper); border: 2px solid var(--accent);
    box-shadow: 0 2px 6px oklch(0 0 0 / 0.25);
    cursor: grab;
  }
  .slider::-moz-range-thumb {
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--paper); border: 2px solid var(--accent); cursor: grab;
  }

  .input {
    width: 100%;
    border: 1px solid var(--line);
    background: var(--paper);
    border-radius: var(--r-sm);
    padding: 8px 10px;
    font: inherit;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
  }
  .input:focus { outline: 2px solid var(--accent-focus); border-color: var(--accent); }

  /* Asset card */
  .asset {
    border-top: 1px solid var(--line-soft);
    padding: 18px 20px;
  }
  .asset:first-child { border-top: none; }
  .asset-head {
    display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
  }
  .swatch { width: 14px; height: 14px; border-radius: 4px; border: 1px solid oklch(0 0 0 / 0.05); }
  .asset-kind { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.05em; }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.04em; }

  .input-group { position: relative; }
  .input-group .suffix {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    font-size: 12px; color: var(--ink-mute); pointer-events: none;
  }
  .input-group input { padding-right: 28px; }

  .add-row { padding: 14px 20px; border-top: 1px solid var(--line-soft); }
  .btn {
    width: 100%;
    border: 1px dashed var(--line);
    background: transparent;
    border-radius: var(--r-sm);
    padding: 10px;
    font: 500 13px Inter, sans-serif;
    color: var(--ink-soft);
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s;
  }
  .btn:hover { background: var(--bg-2); color: var(--ink); border-color: var(--line); }

  .menu {
    position: absolute; z-index: 10;
    background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
    box-shadow: var(--shadow-2);
    padding: 6px; min-width: 220px;
  }
  .menu button {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: transparent; border: none; text-align: left;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    font: 500 13px Inter, sans-serif; color: var(--ink);
  }
  .menu button:hover { background: var(--bg-2); }

  .icon-btn {
    background: transparent; border: 1px solid transparent; border-radius: 6px;
    width: 26px; height: 26px;
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ink-mute);
  }
  .icon-btn:hover { background: var(--bg-2); color: var(--ink); }

  /* KPIs */
  .kpis {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 18px;
  }
  @media (max-width: 720px) { .kpis { grid-template-columns: repeat(2, 1fr); } }
  .kpi {
    background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
    padding: 14px 16px; box-shadow: var(--shadow-1);
    display: flex; flex-direction: column; gap: 4px;
  }
  .kpi-label { font-size: 11px; color: var(--ink-mute); text-transform: uppercase; letter-spacing: 0.06em; }
  .kpi-val { font-family: "Instrument Serif", serif; font-size: 30px; line-height: 1.05; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .kpi-sub { font-size: 12px; color: var(--ink-soft); }
  .kpi-accent-cash { color: var(--kpi-cash); }
  .kpi-accent-etf  { color: var(--kpi-etf); }

  /* Chart */
  .chart-wrap { padding: 8px 14px 18px; }
  .chart-svg { width: 100%; height: auto; display: block; font-family: Inter, sans-serif; }
  .legend { display: flex; flex-wrap: wrap; gap: 14px 22px; padding: 6px 20px 14px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--ink-soft); }
  .legend-item .swatch { width: 12px; height: 12px; border-radius: 3px; }

  /* Insights */
  .insight {
    display: flex; gap: 14px; padding: 14px 18px;
    border-top: 1px solid var(--line-soft);
    align-items: flex-start;
  }
  .insight:first-child { border-top: none; }
  .insight-icon {
    width: 32px; height: 32px; border-radius: 10px; flex: none;
    display: grid; place-items: center;
    background: var(--insight-bg);
    color: var(--insight-fg);
    font-family: "Instrument Serif", serif; font-size: 18px;
  }
  .insight-body h4 { margin: 0 0 2px; font-size: 14px; font-weight: 600; }
  .insight-body p  { margin: 0; font-size: 13px; color: var(--ink-soft); line-height: 1.5; }

  /* Tooltip */
  .tt {
    position: fixed; pointer-events: none;
    background: var(--tt-bg);
    color: var(--tt-fg);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    box-shadow: 0 8px 24px -8px rgba(0,0,0,0.3);
    transform: translate(-50%, calc(-100% - 12px));
    white-space: nowrap;
    z-index: 20;
    line-height: 1.5;
  }
  .tt b { font-weight: 600; }
  .tt .tt-row { display: flex; align-items: center; gap: 8px; }
  .tt .swatch { width: 8px; height: 8px; border-radius: 2px; }

  /* Horizon bar */
  .horizon-bar {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 18px 22px 14px;
    margin-bottom: 22px;
    box-shadow: var(--shadow-1);
  }
  .horizon-label {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px;
  }
  .horizon-caption {
    font-size: 12px; color: var(--ink-mute);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  .horizon-value { display: flex; align-items: baseline; }
  .horizon-slider { margin: 4px 0 8px; }
</style>
<script>
  (function () {
    try {
      var t = localStorage.getItem("sparplaner.theme");
      if (t === "dark" || t === "light") {
        document.documentElement.setAttribute("data-theme", t);
      }
    } catch (e) {}
  })();
</script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="src/calc.js"></script>
  <script type="text/babel" src="src/Chart.jsx"></script>
  <script type="text/babel" src="src/AssetCard.jsx"></script>
  <script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
